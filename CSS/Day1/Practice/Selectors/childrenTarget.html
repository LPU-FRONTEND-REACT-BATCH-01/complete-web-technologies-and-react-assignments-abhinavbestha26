<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul h1:first-child{
            color: yellow;
        }

         ul h1:first-child:hover{
            background-color: red;
            font-family:monospace;
        }
        ul li:last-child{
            color: aqua;
        }
        ul li:nth-child(7){
            color: aquamarine;
        }
        ul li:first-of-type{
            color:beige;
        }
        ul li:last-of-type{
            color: red;
        }
        ul h1:last-of-type{
            color:blue ;
        }

        ul h1:last-of-type:hover{
            background-color:red ;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            color: yellow;
        }


        ul li:nth-of-type(3){
            color: chartreuse;
        }
    </style>
</head>
<body>
    <ul>
        <h1>List of Bikes</h1>
        <li>Royal Enfield</li>
        <li>Lord Splender</li>
        <li>KTM</li>
        <p>Imposter</p>
        <li>R15</li>
        <li>Ninja</li>
        <li>Harley Davidson</li>
        <li>Hyusong</li>
        <li>Ducati</li>
    
        <h1>List of Cars</h1>
        <li>Audi</li>
        <li>Alto</li>
        <li>Skoda</li>
        <li>Volkswagon</li>
    </ul>
</body>
</html>
