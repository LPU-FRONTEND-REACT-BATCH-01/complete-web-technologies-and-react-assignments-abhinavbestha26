<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       .biryani>div+li{
            color: green;
        }
        .biryani>li{
            color: orange;
        }
        h1~h1{
            color: gray;
        }
        .lassi>li{
            color: green;
        }
        .sugar{
            color: red;
        }
    </style>
</head>
<body>
    <ul class="biryani">
        <h1>Ingredians For Biryani</h1>
        <li>Basmathi Rice</li>
        <li>Chicken</li>
        <div class="Chicken">
            <ul>
                <li>Grilled</li>
                <li>Roasted</li>
                <li>Fried</li>
            </ul>
        </div>
        <li>Paneer</li>
        <h1>Fighter Jet</h1>
        <li>Spices</li>
        <li>Gas/Electric</li>
    </ul>
    <ul class="lassi">
        <h1>Ingredians For Lassi</h1>
        <li>Curd</li>
        <li>Water</li>
        <li>Sugar</li>
        <div class="sugar">
            <ul>
                <li>White Sugar</li>
                <li>Brown Sugar</li>
            </ul>
        </div>
        <li>Malai</li>
        <li>Kova</li>
    </ul>
</body>
</html>
