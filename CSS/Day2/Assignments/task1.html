<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 450px;
            width: 400px;
            text-align: center;
            font-size: 25px;
            line-height: 35px;
        }
        h3:first-letter{
            color: purple;
            font-size: 45px;
            
        }
        h2{
            color: grey;
        }
        div:hover{
            height: 400px;
            width: 700px;
            line-height: 70px;
            box-shadow: 10px 10px 10px;
            text-align: center;
            
            font-family: Georgia, 'Times New Roman', Times, serif;
        }
        div:hover .quote{
            letter-spacing: 8px;
        }
        div:hover h2{
            color: plum;
            background-color: red;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            transition: all 2s ease-in-out;
        }
    </style>

</head>
<body>
    <div>
        <h3 class="quote">The only way to do great work is to love what you do.</h3>
        <h2><u> --Steve Jobs </u> </h2>
    </div>
</body>
</html>
